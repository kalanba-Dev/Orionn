<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Orionn</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.box {
    width: 300px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #00f2ff;
    cursor: pointer;
    font-weight: bold;
}

.google {
    margin-top: 10px;
    background: white;
    color: black;
}

a {
    color: cyan;
}
</style>
</head>

<body>

<div class="box">
    <h2>Orionn Login</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Correo">
        <input type="password" name="password" placeholder="Contraseña">
        <button>Entrar</button>
    </form>

    <button class="google" onclick="location.href='/login/google'">
        Iniciar con Google
    </button>

    <p>No tienes cuenta? <a href="/register">Regístrate</a></p>
</div>

</body>
</html>
